<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LeetLog AI</title>
    <style>
        body { width: 300px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; }
        button { background-color: #f7a01a; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; color: #333; }
    </style>
</head>
<body>
    <h2>LeetLog AI</h2>
    <p>Generate a Dev.to blog for the current LeetCode problem.</p>
    
    <div style="margin-bottom: 15px; text-align: left;">
        <label for="geminiKey" style="font-size: 11px; color: #666; display: block; margin-bottom: 2px;">Gemini API Key (Optional)</label>
        <input type="password" id="geminiKey" placeholder="Paste your key to avoid limits" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 12px;">
    </div>

    <button id="generateBtn">Generate Blog</button>
    <div id="status">Idle</div>
    <script src="popup.js"></script>
</body>
</html>
