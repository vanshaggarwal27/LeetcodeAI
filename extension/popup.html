<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LeetLog AI</title>
    <style>
        body { width: 300px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; }
        button { background-color: #f7a01a; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; color: #333; }
    </style>
</head>
<body>
    <h2>LeetLog AI</h2>
    <p>Generate a Dev.to blog for the current LeetCode problem.</p>
    
    <div style="margin-bottom: 15px; text-align: left; border-top: 1px solid #eee; padding-top: 10px;">
        <label style="font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px;">Reminders</label>
        <div style="display: flex; align-items: center; margin-bottom: 5px;">
            <input type="checkbox" id="reminderEnabled" style="margin-right: 5px;">
            <label for="reminderEnabled" style="font-size: 12px;">WhatsApp Reminder (11 PM)</label>
        </div>
        <div id="reminderFields" style="display: none;">
            <input type="text" id="phone" placeholder="WhatsApp Phone (e.g. +91...)" style="width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 11px;">
        </div>
    </div>

    <button id="generateBtn">Generate Blog</button>
    <div id="status">Idle</div>
    <script src="popup.js"></script>
</body>
</html>
